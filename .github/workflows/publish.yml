name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish Python distribution
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # 用于 PyPI 信任发布 (Trusted Publishing)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Build distribution
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # 注意：如果你不想手动设置 Token，可以使用 PyPI 的 Trusted Publishing
          # 如果你坚持使用 Token，请在仓库 Secrets 中设置 PYPI_API_TOKEN
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
