[project]
name = "engram-peft"
version = "1.0.1"
description = "Engram-PEFT: Efficient Parameter-Efficient Fine-Tuning with Engram"
readme = "README.md"
authors = [
    { name = "QingGo", email = "zyqingjohn@qq.com" }
]
license = "Apache-2.0"
requires-python = ">=3.10, <3.13"
dependencies = [
    "torch>=2.4.0",
    "transformers>=4.45.0",
    "safetensors>=0.4.0",
    "tokenizers>=0.19.0",
    "accelerate>=1.13.0",
    "httpx[socks]>=0.28.1",
]
[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}
packages = ["engram_peft"]

[tool.pytest.ini_options]
pythonpath = ["src"]
testpaths = ["tests"]

[tool.black]
line-length = 88
target-version = ['py310']

[tool.isort]
profile = "black"

[[tool.uv.index]]
name = "pytorch"
url = "https://download.pytorch.org/whl/cu121"
explicit = true

[tool.uv.sources]
torch = { index = "pytorch" }
torchvision = { index = "pytorch" }
torchaudio = { index = "pytorch" }

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true

[dependency-groups]
dev = [
    "black>=24.0.0",
    "datasets>=4.8.4",
    "isort>=5.13.0",
    "matplotlib>=3.10.8",
    "mypy>=1.10.0",
    "pandas-stubs>=2.3.3.260113",
    "peft>=0.18.1",
    "pytest-cov>=5.0.0",
    "pytest>=8.0.0",
    "scipy>=1.15.3",
    "seaborn>=0.13.2",
    "setuptools>=82.0.1",
    "sympy>=1.14.0",
    "torchinfo>=1.8.0",
    "torchview>=0.2.7",
    "torchviz>=0.0.3",
    "types-seaborn>=0.13.2.20260408",
]
