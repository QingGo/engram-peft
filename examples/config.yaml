# Minimal example configuration for engram-peft train
# To get a full, documented template, run: engram-peft config-template --output full_config.yaml

model_name_or_path: "TinyLlama/TinyLlama-1.1B-Chat-v1.0"

engram_config:
  target_layers: [2, 15]  # Inject into matching layers

training_args:
  output_dir: "./outputs/tinyllama-engram"
  max_steps: 100
  save_strategy: "no"
  learning_rate: 0.0002
  bf16: true

data_args:
  dataset_name: "tatsu-lab/alpaca"
  max_length: 512
