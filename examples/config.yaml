# Minimal example configuration for engram-peft train
# To get a full, documented template, run: engram-peft config-template --output full_config.yaml

model_name_or_path: "TinyLlama/TinyLlama-1.1B-intermediate-step-1431k-3T"

engram_config:
  target_layers: [1, 14]  # Inject into matching layers

# Recommended: Use LoRA for structural adaptation + Engram for knowledge
lora_config:
  r: 8
  lora_alpha: 32
  target_modules: ["q_proj", "v_proj"]

training_args:
  output_dir: "./outputs/tinyllama-lora-engram"
  max_steps: 100
  save_strategy: "no"
  learning_rate: 0.0002
  bf16: true

data_args:
  dataset_name: "tatsu-lab/alpaca"
  max_length: 512
