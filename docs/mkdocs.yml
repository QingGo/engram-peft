site_name: Engram-PEFT
site_description: 100% Alignment with DeepSeek Engram Paper (arXiv:2601.07372)
site_author: DeepSeek-AI & Engram-PEFT Contributors
repo_url: https://github.com/QingGo/engram-peft
edit_uri: edit/main/docs/
docs_dir: .
site_dir: ../site
not_in_nav: |
  PRD.md
  checklist.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - 简体中文: README_zh.md
  - Tutorial: tutorial.md
  - API Reference: api.md
  - Paper Alignment: paper_alignment.md
